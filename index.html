<!doctype html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap"
            rel="stylesheet"
        />
        <meta charset="UTF-8" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />
        <link rel="icon" href="Assets/infinity-solid-full.svg" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Profile Page</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <button id="mute-button">
            <i class="fa-solid fa-volume-xmark"></i>
        </button>
        <audio
            class="background-audio"
            autoplay
            loop
            src="Assets/BackgroundMusic.mp3"
        ></audio>
        <video
            class="background-vid"
            autoplay
            loop
            muted
            src="Assets/Cairo-Night.mp4"
        ></video>
        <div class="profile-section">
            <div class="profile-text">
                <img
                    class="profile-photo"
                    src="https://github.com/AlwaysNameless.png"
                    alt="Sata andagi"
                />
                <div class="profile-info">
                    <h4>Nameless</h4>
                    <p>yo whats up dawg i made this look down</p>
                </div>
            </div>
        </div>
        <div id="card-grids"></div>
        <script src="script.js"></script>
    </body>
</html>
